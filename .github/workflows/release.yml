# ScholarScribe — automated release builds on Windows, macOS, and Linux.
#
# When you push a tag matching v* (e.g. v0.2.1-pre), this workflow:
#   1. Spins up Windows, macOS, and Linux runners in parallel.
#   2. Installs Rust, Node, and platform-specific prerequisites.
#   3. Builds platform installers via `tauri build`.
#   4. Uploads all installers to the matching GitHub Release.
#
# To trigger:
#   git tag v0.2.1-pre
#   git push origin v0.2.1-pre

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Verify frontend type-checks
        run: npm run check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "${{ inputs.tag || github.ref_name }} (Pre-release)"
          releaseBody: |
            ScholarScribe ${{ inputs.tag || github.ref_name }}

            ## Install

            1. Install [Ollama](https://ollama.com/download).
            2. Download the installer for your platform below.
            3. Open ScholarScribe → Models tab → download a model.
            4. See [USER_GUIDE.md](USER_GUIDE.md) for the 5-minute walkthrough.

            ## Platforms

            - **Windows**: `.msi` and `.exe` installers
            - **macOS**: `.dmg` and `.app.tar.gz`
            - **Linux**: `.deb` and `.AppImage`

            ## Privacy

            Zero telemetry. Single outbound host (registry.ollama.ai, only on model download). All inference runs locally via Ollama. See [SECURITY.md](SECURITY.md).

            ## Ethical use

            ScholarScribe does **not** include detection-evasion features. See [docs/ETHICS.md](docs/ETHICS.md).
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
